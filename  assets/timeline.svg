    <animate attributeName="r" values="8;24" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values=".45;0" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
