<svg viewBox="0 0 860 685" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fff" stop-opacity=".95"/>
    <stop offset="55%" stop-color="#8b949e" stop-opacity=".5"/>
    <stop offset="100%" stop-color="#30363d" stop-opacity=".18"/>
  </linearGradient>
  <linearGradient id="barG" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
    <stop offset="35%" stop-color="#fff" stop-opacity=".7"/>
    <stop offset="65%" stop-color="#8b949e" stop-opacity=".45"/>
    <stop offset="100%" stop-color="#8b949e" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#fff"/>
    <stop offset="100%" stop-color="#c9d1d9"/>
  </linearGradient>
  <linearGradient id="hrG" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
    <stop offset="20%" stop-color="#fff" stop-opacity=".1"/>
    <stop offset="80%" stop-color="#fff" stop-opacity=".06"/>
    <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="fbG" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#fff" stop-opacity=".04"/>
    <stop offset="50%" stop-color="#fff" stop-opacity=".2"/>
    <stop offset="100%" stop-color="#fff" stop-opacity=".04"/>
  </linearGradient>
  <pattern id="dp" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".55" fill="#fff" fill-opacity=".04"/>
  </pattern>
  <filter id="ng" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="tgw" x="-20%" y="-60%" width="140%" height="220%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .a{animation:fi .8s ease both}
    @keyframes fi{from{opacity:0}to{opacity:1}}

    .hdr{animation:sd .7s cubic-bezier(.16,1,.3,1) .1s both}
    @keyframes sd{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

    .i1,.i2,.i3,.i4,.i5{animation:sr .55s cubic-bezier(.16,1,.3,1) both}
    .i1{animation-delay:.45s}.i2{animation-delay:.65s}
    .i3{animation-delay:.85s}.i4{animation-delay:1.05s}.i5{animation-delay:1.25s}
    @keyframes sr{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}

    .y1,.y2,.y3,.y4,.y5{animation:sl .55s cubic-bezier(.16,1,.3,1) both}
    .y1{animation-delay:.45s}.y2{animation-delay:.65s}
    .y3{animation-delay:.85s}.y4{animation-delay:1.05s}.y5{animation-delay:1.25s}
    @keyframes sl{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}

    .foc{animation:sr .55s cubic-bezier(.16,1,.3,1) 1.45s both}

    .spl{stroke-dasharray:386;stroke-dashoffset:386;animation:ds 1.9s cubic-bezier(.16,1,.3,1) .35s forwards}
    @keyframes ds{to{stroke-dashoffset:0}}

    .nw{animation:ns 3s ease-in-out 2.5s infinite}
    @keyframes ns{0%,100%{fill:#8b949e}50%{fill:#fff}}

    .cr{animation:bl 1.1s step-end 3s infinite}
    @keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
  </style>
</defs>

<rect width="860" height="685" rx="12" fill="#0d1117"/>
<rect width="860" height="685" rx="12" fill="url(#dp)"/>

<g class="a">

  <rect x="80" y="0" width="700" height="2.5" rx="1.5" fill="url(#barG)"/>

  <g class="hdr">
    <text x="430" y="52" text-anchor="middle"
      font-family="ui-monospace,'Cascadia Code','Fira Code','Courier New',monospace"
      font-size="26" font-weight="700" letter-spacing="8"
      fill="url(#tg)" filter="url(#tgw)">ABOUT ME</text>

    <text x="430" y="80" text-anchor="middle"
